<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Account</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 450px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: #0078ff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #005fcc;
        }

        .saved-message {
            margin-top: 15px;
            text-align: center;
            color: green;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>My Account</h2>

    <label>Username</label>
    <input type="text" id="username" placeholder="Enter your username">

    <label>Theme</label>
    <select id="theme">
        <option value="light">Light Mode</option>
        <option value="dark">Dark Mode</option>
        <option value="blue">Blue Mode</option>
    </select>

    <button onclick="saveAccount()">Save Settings</button>

    <div class="saved-message" id="savedMessage">Settings saved!</div>
</div>

<script>
    // Load saved settings when page opens
    window.onload = function() {
        const savedUsername = localStorage.getItem("username");
        const savedTheme = localStorage.getItem("theme");

        if (savedUsername) {
            document.getElementById("username").value = savedUsername;
        }

        if (savedTheme) {
            document.getElementById("theme").value = savedTheme;
            applyTheme(savedTheme);
        }
    };

    function saveAccount() {
        const username = document.getElementById("username").value;
        const theme = document.getElementById("theme").value;

        localStorage.setItem("username", username);
        localStorage.setItem("theme", theme);

        applyTheme(theme);

        const msg = document.getElementById("savedMessage");
        msg.style.display = "block";
        setTimeout(() => msg.style.display = "none", 2000);
    }

    function applyTheme(theme) {
        if (theme === "dark") {
            document.body.style.background = "#222";
            document.body.style.color = "white";
        } else if (theme === "blue") {
            document.body.style.background = "#d0e7ff";
            document.body.style.color = "black";
        } else {
            document.body.style.background = "#f0f0f0";
            document.body.style.color = "black";
        }
    }
</script>

</body>
</html>
