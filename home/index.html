<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Money Pot Calculator</title>
<link rel="manifest" href="manifest.json">
<style>
    .navbar {
    background: #0078ff;
    padding: 12px;
    text-align: center;
    border-radius: 8px;
    margin-bottom: 20px;
}

.navbar a {
    color: white;
    text-decoration: none;
    margin: 0 15px;
    font-size: 18px;
    font-weight: bold;
}

.navbar a:hover {
    text-decoration: underline;
}

    body {
        font-family: Arial, sans-serif;
        background-size: cover;
        background-position: center;
        padding: 20px;
        max-width: 600px;
        margin: auto;
        transition: background-image 0.4s ease;
    }
    h2 { text-align: center; }
    .box {
        background: rgba(255,255,255,0.85);
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 20px;
    }
    label { font-weight: bold; display: block; margin-top: 10px; }
    input, select {
        width: 100%; padding: 8px; margin-top: 5px;
        border-radius: 5px; border: 1px solid #ccc;
    }
    button {
        width: 100%; padding: 10px;
        background: #0078ff; color: white;
        border: none; border-radius: 5px;
        margin-top: 15px; cursor: pointer;
    }
    button:hover { background: #005fcc; }
    ul { list-style: none; padding-left: 0; }
    li {
        background: #eee; padding: 8px;
        margin-top: 5px; border-radius: 5px;
    }
    #mascotBox {
        text-align: center; padding: 20px;
        background: rgba(255,255,255,0.9);
        border-radius: 12px; margin-bottom: 20px;
    }
    #mascot {
        font-size: 80px;
        transition: transform 0.3s ease, color 0.3s ease;
    }
</style>
</head>
<body>
<div class="navbar">
    <a href="../home/">Home</a>
    <a href="../my-account/">My Account</a>
    <a href="../settings/">Settings</a>
</div>

<h2>Money Pot Calculator</h2>

<div id="mascotBox">
    <div id="mascot">🐷</div>
    <p id="mascotMessage">Your piggy bank is ready!</p>
</div>

<div class="box">
    <label>Currency</label>
    <select id="currency">
        <option value="GBP">GBP (£)</option>
        <option value="EUR">EUR (€)</option>
    </select>

    <label>Add Money to Pot</label>
    <input type="number" id="addMoney" placeholder="Enter amount">
    <button onclick="addToPot()">Add to Pot</button>

    <h3>Pot Total: <span id="potTotal">0</span></h3>
</div>

<div class="box">
    <label>Withdraw Money</label>
    <input type="number" id="withdrawAmount" placeholder="Enter amount">
    <button onclick="withdrawMoney()">Withdraw</button>

    <h3>Withdrawal History</h3>
    <ul id="withdrawList"></ul>
</div>

<button onclick="resetAll()">Reset Everything</button>

<script>
    const currencySelect = document.getElementById("currency");
    const potTotalDisplay = document.getElementById("potTotal");
    const withdrawList = document.getElementById("withdrawList");
    const mascot = document.getElementById("mascot");
    const mascotMessage = document.getElementById("mascotMessage");

    let potTotal = 0;
    let withdrawals = [];

    function setBackground() {
        const currency = currencySelect.value;
        document.body.style.backgroundImage =
            currency === "GBP"
            ? "url('img/gbp.jpg')"
            : "url('img/eur.jpg')";
    }

    function loadData() {
        potTotal = Number(localStorage.getItem("potTotal")) || 0;
        withdrawals = JSON.parse(localStorage.getItem("withdrawals")) || [];
        currencySelect.value = localStorage.getItem("currency") || "GBP";

        updateDisplay();
        setBackground();
        updateMascot();
    }

    function saveData() {
        localStorage.setItem("potTotal", potTotal);
        localStorage.setItem("withdrawals", JSON.stringify(withdrawals));
        localStorage.setItem("currency", currencySelect.value);
    }

    function formatCurrency(amount) {
        return currencySelect.value === "GBP" ? `£${amount}` : `€${amount}`;
    }

    function updateDisplay() {
        potTotalDisplay.textContent = formatCurrency(potTotal);
        withdrawList.innerHTML = "";
        withdrawals.forEach(w => {
            const li = document.createElement("li");
            li.textContent = `${formatCurrency(w.amount)} - ${w.date}`;
            withdrawList.appendChild(li);
        });
    }

    function updateMascot() {
        if (potTotal <= 0) {
            mascot.textContent = "🐷";
            mascot.style.color = "#ff6666";
            mascotMessage.textContent = "Your piggy bank is empty!";
        } else if (potTotal < 50) {
            mascot.textContent = "🐽";
            mascot.style.color = "#ff9900";
            mascotMessage.textContent = "Your piggy bank has a little money!";
        } else if (potTotal < 200) {
            mascot.textContent = "🐷";
            mascot.style.color = "#66cc66";
            mascotMessage.textContent = "Your piggy bank is getting happy!";
        } else {
            mascot.textContent = "🐖";
            mascot.style.color = "#33cc33";
            mascotMessage.textContent = "Your piggy bank is full and proud!";
        }
    }

    function addToPot() {
        const amount = Number(document.getElementById("addMoney").value);
        if (amount > 0) {
            potTotal += amount;

            mascot.style.transform = "scale(1.2)";
            mascotMessage.textContent = "Yay! You fed the piggy bank!";
            setTimeout(() => mascot.style.transform = "scale(1)", 300);

            saveData();
            updateDisplay();
            updateMascot();
            document.getElementById("addMoney").value = "";
        }
    }

    function withdrawMoney() {
        const amount = Number(document.getElementById("withdrawAmount").value);
        if (amount > 0 && amount <= potTotal) {
            potTotal -= amount;

            withdrawals.push({
                amount: amount,
                date: new Date().toLocaleString()
            });

            mascot.style.transform = "scale(0.8)";
            mascotMessage.textContent = "Oh no! Money taken out!";
            setTimeout(() => mascot.style.transform = "scale(1)", 300);

            saveData();
            updateDisplay();
            updateMascot();
            document.getElementById("withdrawAmount").value = "";
        }
    }

    function resetAll() {
        potTotal = 0;
        withdrawals = [];
        localStorage.clear();
        updateDisplay();
        updateMascot();
        setBackground();
    }

    currencySelect.addEventListener("change", () => {
        saveData();
        updateDisplay();
        setBackground();
    });

    loadData();
</script>

<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js")
        .then(() => console.log("Service Worker Registered"));
}
</script>

        <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 450px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }

        select, input[type="checkbox"] {
            margin-top: 5px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: #0078ff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #005fcc;
        }
    </style>
</head>
<body>
<br><br>
<div class="container">
    <h2>Settings</h2>

    <label>Theme</label>
    <select id="theme">
        <option value="light">Light Mode</option>
        <option value="dark">Dark Mode</option>
        <option value="blue">Blue Mode</option>
    </select>

    <label>
        <input type="checkbox" id="soundToggle">
        Enable Button Sounds
    </label>

    <label>
        <input type="checkbox" id="bigButtonsToggle">
        Use Big Buttons
    </label>

    <button onclick="saveSettings()">Save Settings</button>
</div>

<script>
    // Load saved settings
    window.onload = function() {
        const savedTheme = localStorage.getItem("theme");
        const savedSound = localStorage.getItem("sound");
        const savedBigButtons = localStorage.getItem("bigButtons");

        if (savedTheme) {
            document.getElementById("theme").value = savedTheme;
            applyTheme(savedTheme);
        }

        if (savedSound === "true") {
            document.getElementById("soundToggle").checked = true;
        }

        if (savedBigButtons === "true") {
            document.getElementById("bigButtonsToggle").checked = true;
        }
    };

    function saveSettings() {
        const theme = document.getElementById("theme").value;
        const sound = document.getElementById("soundToggle").checked;
        const bigButtons = document.getElementById("bigButtonsToggle").checked;

        localStorage.setItem("theme", theme);
        localStorage.setItem("sound", sound);
        localStorage.setItem("bigButtons", bigButtons);

        applyTheme(theme);

        // Redirect to home page after saving
        window.location.href = "../home/";
    }

    function applyTheme(theme) {
        if (theme === "dark") {
            document.body.style.background = "#222";
            document.body.style.color = "white";
        } else if (theme === "blue") {
            document.body.style.background = "#d0e7ff";
            document.body.style.color = "black";
        } else {
            document.body.style.background = "#f0f0f0";
            document.body.style.color = "black";
        }
    }
</script>

</body>
</html>
